services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: attendance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    ports:
      - "8000:8000"
    environment:
      ATTENDANCE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/attendance
      ATTENDANCE_REDIS_URL: redis://redis:6379/0
      ATTENDANCE_JWT_SECRET_KEY: change-me-in-production
      ATTENDANCE_DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ../dashboard-streamlit
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  pgdata:
